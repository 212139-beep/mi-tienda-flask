{% extends "base.html" %}
{% block title %}{% if producto %}Editar{% else %}Nuevo{% endif %} Producto — Admin{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto">
  <h1 class="section-title">{% if producto %}Editar producto{% else %}Nuevo producto{% endif %} <span>·</span></h1>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem">
    <form method="POST">
      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" name="nombre" required value="{{ producto.nombre if producto else '' }}" placeholder="Ej: Laptop UltraBook Pro">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea name="descripcion" required placeholder="Describe el producto...">{{ producto.descripcion if producto else '' }}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label>Precio (S/)</label>
          <input type="number" name="precio" required step="0.01" min="0" value="{{ producto.precio if producto else '' }}" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="stock" required min="0" value="{{ producto.stock if producto else '10' }}">
        </div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select name="categoria" required>
          {% for cat in ['Tecnología', 'Accesorios', 'Libros', 'Ropa', 'Hogar', 'Deportes', 'Otro'] %}
          <option value="{{ cat }}" {% if producto and producto.categoria == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>URL de imagen (opcional)</label>
        <input type="text" name="imagen_url" value="{{ producto.imagen_url if producto else '' }}" placeholder="https://...">
      </div>
      <div style="display:flex;gap:1rem;margin-top:.5rem">
        <button type="submit" class="btn-primary" style="padding:.75rem 2rem">
          {% if producto %}Guardar cambios{% else %}Crear producto{% endif %}
        </button>
        <a href="/admin" class="btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
