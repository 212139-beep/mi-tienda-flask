{% extends "base.html" %}
{% block title %}Registro — TechStore{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap { max-width:420px; margin:3rem auto; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem 2.5rem; }
  .auth-card h1 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; margin-bottom:.4rem; }
  .auth-card .sub { color:var(--text2); font-size:.88rem; margin-bottom:1.75rem; }
  .auth-footer { text-align:center; margin-top:1.25rem; color:var(--text3); font-size:.85rem; }
  .auth-footer a { color:var(--accent); text-decoration:none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="sub">Regístrate para empezar a comprar</p>
    <form method="POST" action="/registro">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" name="nombre" required placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" required placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:.8rem;margin-top:.5rem">Crear cuenta</button>
    </form>
    <div class="auth-footer">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></div>
  </div>
</div>
{% endblock %}
